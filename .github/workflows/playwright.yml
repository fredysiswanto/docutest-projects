name: Playwright Tests

on:
  push:
    branches: [main, master]
    paths:
      - "app/tests/**"
      - "app/helpers/**"
      - "playwright.config.ts"
      - "package.json"
      - ".github/workflows/playwright.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "app/tests/**"
      - "app/helpers/**"
      - "playwright.config.ts"
      - "package.json"

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Ubah ke 'self-hosted' jika pakai local runner
    # runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm test

      - name: Copy Test Report to Docusaurus
        if: always()
        run: |
          mkdir -p documentation/static/test-reports
          cp -r reports/* documentation/static/test-reports/

      - name: Commit and Push Test Reports
        if: always() && github.event_name == 'push'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add documentation/static/test-reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update test reports [skip ci]" && git push)

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
